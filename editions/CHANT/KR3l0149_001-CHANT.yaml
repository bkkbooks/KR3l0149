body:
  text: 孔氏志怪楚文王好田天下快狗名鷹畢聚焉有人獻一鷹曰非王鷹之儔俄而雲際有一物凝翔飄颻鮮白而不辨其形鷹於是竦翮而升矗若飛電須臾羽墮如雪血灑如雨良久有一大鳥墮地而死度其兩翅廣數十里喙邊有黃眾莫能知有博物君子曰此大鵬雛也始飛焉故為鷹所制乃厚賞獻者初學記三十盧充者范陽人也家西三十里有崔少府墓充先冬至一日出家西獵見一麞舉弓而射即中之麞倒而復起充逐之不覺遠忽見一里門如府舍中一鈴下有唱家前充問曰此何府也荅曰少府府也充曰我衣惡那得見貴人即有人提襆新衣迎之充著盡可體便進見少府展姓名酒炙數行崔曰近得尊府君書為君索小女婚故相延耳即舉書示充充父亡時雖小然已見父手跡便歔歎無辭崔即敕內令女郎莊嚴使充就東廊充至女已下車立席頭共拜焉三日畢還見崔崔曰君可歸矣女有娠相生男當以相還生女當自留養敕外嚴車送客崔送至門執手涕零離別之感無異生人復致衣一襲被褥一副充便上車去如電逝須臾至家家人相見悲喜推問知崔是亡人而入其墓追以懊喪居四年三月三日臨水戲水中忽見二犢車乍浮乍沒既上岸充往開車後戶見崔氏女與三歲男兒共載充見之欣然欲握其手女舉手指後車曰府君見人即見少府充往問訊女抱兒還充又與金盌別并贈詩曰煌煌靈芝質光麗何猗猗華豔當時顯嘉異表神奇含英未及秀中夏罹霜萎榮曜長幽滅世路永無施不悟陰陽運哲人忽來儀會淺別離速皆由靈與祗何以贈余親金盌可頤兒愛恩從此別斷絕傷肝脾充取兒盌及詩忽不見二車處將兒還四座謂是鬼魅僉遙唾之形如故問兒誰是汝父兒逕就充懷眾初怪惡傳省其詩慨然嘆死生之玄通也充詣巿賣盌高舉其價不欲速售冀有識者欻有一老婢問充得盌之由還報其大家大家即女姨也遣視之果是謂充曰我姨姊崔少府女未嫁而亡家親痛之贈一金盌著棺中今視卿盌甚似得盌本末可得聞不充以事對即詣充家迎兒兒有崔氏狀又似充貌姨曰我甥三月末間產父曰春煖溫也願休強矣即字溫休溫休蓋幽婚也其兆先彰矣兒遂成為令器歷數郡二千石皆著績其後生植為漢尚書植子毓為魏司空冠蓋相承至今也世說方正篇注李瀚蒙求注上引略後漢末有一人腹內痛晝夜切痛臨終敕其子曰吾氣絕後可剖視之其子不忍違言剖之得一銅鎗容可數合後華佗聞其病而解之便往出巾箱內藥以投之鎗即化為清酒書鈔一百三十五御覽七百四十三又七百五十七廣記二百十八鍾會是荀濟北從舅二人情好不協荀有寶劍可直百萬以付妻會善書學荀手跡作書取劍仍竊去不還荀勗知是鍾而無由也思所以報之後鍾兄弟以千萬起一宅始成甚精麗未得移住荀極善畫乃潛往畫鍾門堂作太傅形象衣冠狀貌如平生二鍾入門便大感動宅遂空廢于時咸謂勗之報會過于所失數十倍彼此書畫巧妙之極世說注引孔氏志怪義興有邪足虎溪渚長橋有蒼蛟並大噉人并郭西周時謂郡中三害周即處也世說自新篇注初學記八干寶父有嬖人寶母至妬葬寶父時因推著藏中經十年而母喪開墓其婢伏棺上就視猶煖漸有氣息輿還家終日而蘇說寶父常致飲食與之接寢恩情如生家中吉凶輒語之校之悉驗平復數年後方卒寶因作搜神記中云有所感起是也世說排調篇注晉明帝時獻馬者夢河神請之及至帝夢同即投河以奉神始太傅褚褒亦好此馬帝曰已與河神及褚公卒軍人見公乘此馬矣廣記二百七十六會稽盛逸嘗晨興路未有行人見門內柳樹上有一人長二尺餘衣朱衣冠冕俯以舌餂樹葉上露良久忽見逸神意如驚遽即隱不見類聚八十九御覽九百五十七會稽吏謝宗赴假吳中獨在船忽有女子姿性妖婉來入船問宗有佳絲否欲巿之宗因與戲女漸相容留在船宿歡宴既曉因求宗寄載宗便許之自爾船人恆夕但聞言笑兼芬馥氣至一年往來同宿密伺之不見有人方知是邪魅遂共掩之良久得一物大如枕須臾得二物並小如拳以火視之乃是三龜宗悲思數日方悟自說此女子一歲生二男大者名道愍小者名道興既為龜送之於江御覽九百三十一南方落民其頭能飛其俗所祠名曰蟲落因號落民酉陽雜俎四引于氏志怪案于氏疑是孔氏之訛
